<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculador de Combinaciones Complejas</title>
    <link rel="stylesheet" href="./css/style.css">
</head>
<body>
    <main class="container">
        <header>
            <h1>🎲 Análisis Combinatorio de Sorteos</h1>
            <p>Cálculo de Probabilidades para Grupos Independientes</p>
        </header>

        <section class="card">
            <form id="formSorteo">
                <!-- Configuración Grupo 1 -->
                <div class="grupo-section">
                    <h3>Grupo de Sorteo 1</h3>
                    <div class="input-row">
                        <div class="input-group">
                            <label for="n1">Elementos (n₁)</label>
                            <input type="number" id="n1" value="59" min="1" required>
                        </div>
                        <div class="input-group">
                            <label for="r1">Muestra (r₁)</label>
                            <input type="number" id="r1" value="5" min="1" required>
                        </div>
                    </div>
                </div>

                <!-- Configuración Grupo 2 -->
                <div class="grupo-section">
                    <h3>Grupo de Sorteo 2</h3>
                    <div class="input-row">
                        <div class="input-group">
                            <label for="n2">Elementos (n₂)</label>
                            <input type="number" id="n2" value="35" min="1" required>
                        </div>
                        <div class="input-group">
                            <label for="r2">Muestra (r₂)</label>
                            <input type="number" id="r2" value="1" min="1" required>
                        </div>
                    </div>
                </div>

                <button type="button" onclick="calcularSorteo()">Calcular Espacio Muestral</button>
            </form>
            <div id="resultadoSorteo" class="result-box">Esperando configuración de los grupos...</div>
        </section>
    </main>
    <script src="./js/script.js"></script>
</body>
</html>
