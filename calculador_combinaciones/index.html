<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulador de Transferencia de Calor</title>
    <link rel="stylesheet" href="./css/style.css">
</head>
<body>
    <main class="container">
        <header>
            <h1>🌡️ Ley de Enfriamiento de Newton</h1>
            <p>Monitoreo y Predicción de Transferencia Térmica</p>
        </header>

        <section class="card">
            <form id="formCalor">
                <div class="input-group">
                    <label for="t0">Temperatura Inicial del Objeto (T₀)</label>
                    <input type="number" id="t0" value="120" placeholder="Ej. 120" required>
                </div>
                <div class="input-group">
                    <label for="ts">Temperatura del Entorno (Ts)</label>
                    <input type="number" id="ts" value="38" placeholder="Ej. 38" required>
                </div>
                <div class="input-group">
                    <label for="k">Constante de Enfriamiento (k)</label>
                    <input type="number" step="0.01" id="k" value="0.45" placeholder="Ej. 0.45" required>
                </div>
                <div class="input-group">
                    <label for="t_time">Tiempo Transcurrido (t en horas)</label>
                    <input type="number" step="0.1" id="t_time" value="3" placeholder="Ej. 3" required>
                </div>
                <button type="button" onclick="calcularCalor()">Simular Descenso Térmico</button>
            </form>
            <div id="resultadoCalor" class="result-box">Esperando parámetros de simulación...</div>
        </section>
    </main>
    <script src="./js/script.js"></script>
</body>
</html>
